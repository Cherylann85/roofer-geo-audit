
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free AI Visibility Audit for Roofers | Bright Box Solutions</title>
  <meta name="description" content="Find out if homeowners can find your roofing business on ChatGPT and Google AI. Free audit — we'll be in touch within 24 hours."/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#0C1117;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const { useState, useEffect } = React;

const WEBHOOK = "https://geo-audit-backend-1.onrender.com/webhook";
const ORANGE = "#FF6B2B";
const SLATE = "#0C1117";
const SLATE_CARD = "#141B24";
const SLATE_BDR = "#1E2A38";

const css = `
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Courier+Prime:wght@400;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:${SLATE};font-family:'Courier Prime',monospace;}
  .serif{font-family:'Playfair Display',Georgia,serif;}
  .fade-in{animation:fi 0.4s ease both;}
  @keyframes fi{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .field{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:'Courier Prime',monospace;font-size:14px;padding:16px 18px;outline:none;transition:border-color 0.2s;letter-spacing:0.04em;}
  .field:focus{border-color:${ORANGE};}
  .field::placeholder{color:rgba(255,255,255,0.25);}
  .btn-orange{width:100%;background:${ORANGE};color:#fff;border:none;padding:20px 28px;font-family:'Courier Prime',monospace;font-weight:700;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;box-shadow:0 8px 32px rgba(255,107,43,0.35);}
  .btn-orange:hover{background:#e55a20;transform:translateY(-1px);}
  .btn-orange:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
  .orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;}
  @keyframes pulse{0%,100%{opacity:0.6;}50%{opacity:1;}}
  .pulse{animation:pulse 2s ease-in-out infinite;}
`;

const STATS = [
  { number: "73%", label: "of homeowners use AI search to find local tradespeople" },
  { number: "9/10", label: "roofers are completely invisible to AI search engines" },
  { number: "FREE", label: "complete AI visibility audit — no payment required" },
  { number: "24hrs", label: "to receive your full professional report" },
];

const WHAT_YOU_GET = [
  { icon: "🎯", title: "AI Citation Score", desc: "Your 0–10 score showing how visible your roofing business is across ChatGPT, Perplexity and Google AI" },
  { icon: "🔍", title: "Crawler Accessibility Report", desc: "Whether AI search engines can actually read and index your website — many roofer sites have invisible blockers" },
  { icon: "📍", title: "Local Geo-Visibility Analysis", desc: "How well your business appears when homeowners in your area search for roofers using AI tools" },
  { icon: "⚡", title: "Competitor Gap Analysis", desc: "Which local roofers ARE showing up in AI search — and what they're doing differently" },
  { icon: "📋", title: "Priority Action Plan", desc: "The exact fixes ranked by impact — so you know what to do first to start appearing in AI search results" },
];

const FAQS = [
  { q: "What is AI search and why does it matter for my roofing business?", a: "When a homeowner types 'find me a roofer near me' into ChatGPT or Google's AI, it pulls from a completely different set of signals than traditional Google search. Most roofers are invisible on these platforms — meaning potential customers are being directed to competitors who've been indexed." },
  { q: "How does the audit work?", a: "You enter your website URL and email. Our system automatically analyses your domain across major AI search engines within 24 hours and emails you a full report with scores, findings and an action plan." },
  { q: "Do I need any technical knowledge?", a: "None at all. The report is written in plain English with clear recommendations. No jargon, no tech background required." },
  { q: "What happens after I receive the report?", a: "The report is yours to keep and act on yourself. If you'd like expert help implementing the recommendations, you can book a free 20-minute consultation with Bright Box Solutions — but there's absolutely no obligation." },
];

function App() {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [website, setWebsite] = useState("");
  const [phone, setPhone] = useState("");
  const [status, setStatus] = useState("idle");
  const [openFaq, setOpenFaq] = useState(null);

  useEffect(() => {
    const s = document.createElement("style");
    s.textContent = css;
    document.head.appendChild(s);
    return () => document.head.removeChild(s);
  }, []);

  const valid = name.length > 1 && email.includes("@") && website.length > 4 && phone.length > 7;

  const handleSubmit = async () => {
    if (!valid) return;
    setStatus("sending");
    try {
      await fetch(WEBHOOK, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: website, email, name, phone, route: "Roofer Geo Audit — Free" })
      });
    } catch(e) {}
    setStatus("done");
  };

  return (
    React.createElement("div", { style: { minHeight: "100vh", background: SLATE, position: "relative", overflow: "hidden" } },
      React.createElement("div", { className: "orb", style: { width: 600, height: 600, background: "radial-gradient(circle,rgba(255,107,43,0.15) 0%,transparent 70%)", top: -100, right: -150 } }),
      React.createElement("div", { className: "orb", style: { width: 400, height: 400, background: "radial-gradient(circle,rgba(255,107,43,0.08) 0%,transparent 70%)", bottom: 200, left: -100 } }),

      React.createElement("div", { style: { position: "relative", zIndex: 1, maxWidth: 680, margin: "0 auto", padding: "0 20px 80px" } },

        // HEADER
        React.createElement("div", { style: { padding: "24px 0 0", display: "flex", alignItems: "center", justifyContent: "space-between" } },
          React.createElement("div", { style: { fontFamily: "'Playfair Display',serif", fontWeight: 700, fontSize: 15, color: "#fff", letterSpacing: "0.12em" } }, "BRIGHT BOX",
            React.createElement("div", { style: { height: 1, background: "#fff", marginTop: 2, opacity: 0.5 } })
          ),
          React.createElement("div", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: "0.12em", textTransform: "uppercase" } }, "ISO AI Management Practitioners")
        ),

        // HERO
        React.createElement("div", { className: "fade-in", style: { paddingTop: 56, paddingBottom: 48 } },
          React.createElement("div", { style: { display: "inline-flex", alignItems: "center", gap: 8, border: "1px solid rgba(255,107,43,0.4)", borderRadius: 99, padding: "5px 14px", marginBottom: 24 } },
            React.createElement("span", { className: "pulse", style: { width: 6, height: 6, borderRadius: "50%", background: ORANGE, display: "inline-block", boxShadow: "0 0 8px " + ORANGE } }),
            React.createElement("span", { style: { fontSize: 10, fontWeight: 700, color: ORANGE, letterSpacing: "0.15em", textTransform: "uppercase" } }, "Free report for UK roofers — limited availability")
          ),
          React.createElement("h1", { className: "serif", style: { fontSize: "clamp(32px,6vw,52px)", fontWeight: 900, color: "#fff", lineHeight: 1.1, marginBottom: 20, letterSpacing: "-0.02em" } },
            "Is Your Roofing Business ",
            React.createElement("span", { style: { color: ORANGE, fontStyle: "italic" } }, "Invisible"),
            " to AI Search?"
          ),
          React.createElement("p", { style: { fontSize: 15, color: "rgba(255,255,255,0.55)", lineHeight: 1.8, marginBottom: 16, fontFamily: "'Courier Prime',monospace" } },
            "When a homeowner asks ChatGPT or Google AI ",
            React.createElement("em", { style: { color: "rgba(255,255,255,0.8)" } }, '"find me a reliable roofer near me"'),
            " — does your business come up? Most roofers don't know. We'll tell you — completely free."
          ),
          React.createElement("div", { style: { border: "1px solid rgba(255,107,43,0.3)", background: "rgba(255,107,43,0.06)", padding: "14px 18px", marginBottom: 28 } },
            React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 12, color: "rgba(255,255,255,0.7)", lineHeight: 1.7 } },
              "⚡ ",
              React.createElement("span", { style: { color: "#fff" } }, "No payment. No credit card. No catch."),
              " Enter your website URL below and we'll send you a full professional AI visibility report within 24 hours — completely free."
            )
          ),
          React.createElement("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
            ["✅ 100% free", "✅ No sales call", "✅ Plain English report", "✅ 24-hour delivery", "✅ Keep the report forever"].map(t =>
              React.createElement("span", { key: t, style: { fontFamily: "'Courier Prime',monospace", fontSize: 11, color: "rgba(255,255,255,0.5)", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", padding: "4px 10px" } }, t)
            )
          )
        ),

        // STATS
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 48 } },
          STATS.map(({ number, label }) =>
            React.createElement("div", { key: label, style: { background: SLATE_CARD, border: "1px solid " + SLATE_BDR, padding: "20px 18px" } },
              React.createElement("p", { className: "serif", style: { fontSize: 32, fontWeight: 900, color: ORANGE, marginBottom: 6, lineHeight: 1 } }, number),
              React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 11, color: "rgba(255,255,255,0.45)", lineHeight: 1.55 } }, label)
            )
          )
        ),

        // FORM
        status === "done" ?
          React.createElement("div", { className: "fade-in", style: { background: SLATE_CARD, border: "1px solid rgba(255,107,43,0.4)", padding: "40px 32px", textAlign: "center", marginBottom: 48 } },
            React.createElement("div", { style: { fontSize: 48, marginBottom: 16 } }, "✅"),
            React.createElement("p", { className: "serif", style: { fontSize: 24, fontWeight: 800, color: "#fff", marginBottom: 12 } }, "Audit Request Received"),
            React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 13, color: "rgba(255,255,255,0.55)", lineHeight: 1.8 } },
              "Your AI visibility audit for ",
              React.createElement("span", { style: { color: ORANGE } }, website),
              " is being processed. A member of the Bright Box team will be in touch at ",
              React.createElement("span", { style: { color: "#fff" } }, email),
              " within 24 hours with your full report."
            ),
            React.createElement("div", { style: { marginTop: 24, padding: "16px 20px", background: "rgba(255,107,43,0.08)", border: "1px solid rgba(255,107,43,0.2)" } },
              React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 11, color: "rgba(255,255,255,0.4)" } },
                "Want expert help implementing the findings? Book a free 20-minute consultation at ",
                React.createElement("span", { style: { color: ORANGE } }, "brightbox.solutions/ai-audit")
              )
            )
          ) :
          React.createElement("div", { style: { background: SLATE_CARD, border: "1px solid " + SLATE_BDR, overflow: "hidden", marginBottom: 48 } },
            React.createElement("div", { style: { background: ORANGE, padding: "20px 28px" } },
              React.createElement("p", { className: "serif", style: { fontWeight: 800, fontSize: 18, color: "#fff", marginBottom: 4 } }, "Get Your Free AI Visibility Report"),
              React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 11, color: "rgba(255,255,255,0.9)" } }, "No payment · No credit card · We'll be in touch within 24 hours")
            ),
            React.createElement("div", { style: { padding: 28 } },
              React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24, padding: "12px 16px", border: "1px solid rgba(255,107,43,0.25)", background: "rgba(255,107,43,0.05)" } },
                React.createElement("div", null,
                  React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 10, color: ORANGE, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 2 } }, "Completely free — no strings attached"),
                  React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 12, color: "rgba(255,255,255,0.5)" } }, "Full 13-point AI visibility audit of your roofing website")
                ),
                React.createElement("div", { style: { textAlign: "right" } },
                  React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 11, color: "rgba(255,255,255,0.3)", textDecoration: "line-through" } }, "£149"),
                  React.createElement("p", { className: "serif", style: { fontSize: 28, fontWeight: 900, color: ORANGE, lineHeight: 1 } }, "FREE")
                )
              ),
              React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 } },
                React.createElement("input", { className: "field", type: "text", placeholder: "YOUR FULL NAME", value: name, onChange: e => setName(e.target.value) }),
                React.createElement("input", { className: "field", type: "email", placeholder: "EMAIL ADDRESS (report delivered here)", value: email, onChange: e => setEmail(e.target.value) }),
                React.createElement("input", { className: "field", type: "tel", placeholder: "PHONE NUMBER", value: phone, onChange: e => setPhone(e.target.value) }),
                React.createElement("div", null,
                  React.createElement("input", { className: "field", type: "text", placeholder: "YOUR WEBSITE URL (e.g. smithroofinglondon.co.uk)", value: website, onChange: e => setWebsite(e.target.value), style: { borderColor: website.length > 4 ? "rgba(255,107,43,0.6)" : "rgba(255,255,255,0.15)" } }),
                  React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 10, color: "rgba(255,107,43,0.7)", marginTop: 5 } }, "⚡ We audit this URL across AI search engines and deliver your full report")
                )
              ),
              React.createElement("button", { className: "btn-orange", disabled: !valid || status === "sending", onClick: handleSubmit },
                status === "sending" ? "Processing your free audit..." : "Send Me My Free AI Visibility Report →"
              ),
              React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 10, color: "rgba(255,255,255,0.2)", textAlign: "center", marginTop: 12, lineHeight: 1.6 } },
                "🔒 No payment required · No spam · We'll be in touch within 24 hours · No obligation whatsoever"
              )
            )
          ),

        // WHAT YOU GET
        React.createElement("div", { style: { marginBottom: 48 } },
          React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 9, letterSpacing: "0.18em", color: ORANGE, textTransform: "uppercase", marginBottom: 16 } }, "What's in your report"),
          React.createElement("h2", { className: "serif", style: { fontSize: "clamp(22px,4vw,32px)", fontWeight: 800, color: "#fff", marginBottom: 28, lineHeight: 1.2 } }, "Everything you need to know about your AI search visibility"),
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
            WHAT_YOU_GET.map(({ icon, title, desc }) =>
              React.createElement("div", { key: title, style: { background: SLATE_CARD, border: "1px solid " + SLATE_BDR, padding: "20px 22px", display: "flex", gap: 16, alignItems: "flex-start" } },
                React.createElement("span", { style: { fontSize: 22, flexShrink: 0 } }, icon),
                React.createElement("div", null,
                  React.createElement("p", { style: { fontFamily: "'Playfair Display',serif", fontWeight: 700, fontSize: 15, color: "#fff", marginBottom: 5 } }, title),
                  React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 12, color: "rgba(255,255,255,0.45)", lineHeight: 1.65 } }, desc)
                )
              )
            )
          )
        ),

        // WHY NOW
        React.createElement("div", { style: { background: "linear-gradient(135deg, rgba(255,107,43,0.12) 0%, rgba(255,107,43,0.05) 100%)", border: "1px solid rgba(255,107,43,0.3)", padding: "28px 28px", marginBottom: 48 } },
          React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 9, letterSpacing: "0.18em", color: ORANGE, textTransform: "uppercase", marginBottom: 12 } }, "Why this matters right now"),
          React.createElement("h3", { className: "serif", style: { fontSize: 22, fontWeight: 800, color: "#fff", marginBottom: 14, lineHeight: 1.3 } }, "AI search is how homeowners find roofers in 2026. Most roofing businesses don't know they're invisible."),
          React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 12, color: "rgba(255,255,255,0.55)", lineHeight: 1.8, marginBottom: 16 } }, "Traditional Google optimisation took years to become essential. AI search visibility is happening in months. The roofing businesses that check their visibility now and fix what's missing will dominate local AI search results before their competitors even know the game has changed."),
          React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 12, color: "rgba(255,255,255,0.55)", lineHeight: 1.8 } }, "This audit is completely free. If the report shows issues you want fixed, we offer affordable fix packages — but there is absolutely no obligation to do anything beyond reading your report.")
        ),

        // FAQ
        React.createElement("div", { style: { marginBottom: 48 } },
          React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 9, letterSpacing: "0.18em", color: ORANGE, textTransform: "uppercase", marginBottom: 20 } }, "Common questions"),
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
            FAQS.map(({ q, a }, i) =>
              React.createElement("div", { key: i, style: { background: SLATE_CARD, border: "1px solid " + (openFaq === i ? "rgba(255,107,43,0.4)" : SLATE_BDR), overflow: "hidden" } },
                React.createElement("button", { onClick: () => setOpenFaq(openFaq === i ? null : i), style: { width: "100%", background: "transparent", border: "none", padding: "18px 22px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", gap: 12 } },
                  React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 13, color: "#fff", fontWeight: 700, textAlign: "left", lineHeight: 1.4 } }, q),
                  React.createElement("span", { style: { color: ORANGE, fontSize: 18, flexShrink: 0, transition: "transform 0.2s", transform: openFaq === i ? "rotate(45deg)" : "rotate(0deg)" } }, "+")
                ),
                openFaq === i && React.createElement("div", { className: "fade-in", style: { padding: "0 22px 18px" } },
                  React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 12, color: "rgba(255,255,255,0.5)", lineHeight: 1.8 } }, a)
                )
              )
            )
          )
        ),

        // BOTTOM CTA
        React.createElement("div", { style: { background: SLATE_CARD, border: "1px solid " + SLATE_BDR, padding: "32px 28px", textAlign: "center" } },
          React.createElement("p", { className: "serif", style: { fontSize: 24, fontWeight: 800, color: "#fff", marginBottom: 10 } }, "Ready to find out where you stand?"),
          React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 24, lineHeight: 1.7 } }, "Your competitors are either already visible in AI search — or they're not. Either way, you need to know. And it won't cost you a penny to find out."),
          React.createElement("button", { className: "btn-orange", onClick: () => window.scrollTo({ top: 0, behavior: "smooth" }), style: { maxWidth: 420, margin: "0 auto" } }, "Get My Free AI Visibility Report →"),
          React.createElement("p", { style: { fontFamily: "'Courier Prime',monospace", fontSize: 10, color: "rgba(255,255,255,0.2)", marginTop: 12 } }, "Powered by Bright Box Solutions · ISO AI Management Practitioners")
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));

  </script>
</body>
</html>
